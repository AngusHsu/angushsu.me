version: '3.8'

services:
  # Main application
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angus-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - portfolio-network
    labels:
      # Traefik labels for automatic HTTPS (optional)
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`angushsu.me`)"
      - "traefik.http.routers.portfolio.tls.certresolver=le"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
    volumes:
      # Optional: Mount logs directory for persistent logs
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx reverse proxy (optional but recommended for production)
  nginx:
    image: nginx:alpine
    container_name: angus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - portfolio
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  logs:
    driver: local